<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekenen Oefenen - Onder Elkaar</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ecc71;
            --danger: #e74c3c;
            --background: #f5f7fa;
            --text: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 850px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1, h2 { text-align: center; color: var(--primary); }
        .setup-section, .workspace-section, .result-section { display: none; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: bold; }
        select, button {
            padding: 12px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            font-size: 16px;
        }
        .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            background: #ecf0f1;
            padding: 10px;
            border-radius: 6px;
            user-select: none;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #357abd; }
        
        /* Sommenlijst Layout */
        .sommen-lijst {
            margin: 30px 0;
        }
        .som-rij {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            font-size: 20px;
        }
        .som-content {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .som-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .som-rij input[type="text"] {
            width: 120px;
            padding: 8px;
            font-size: 18px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            text-align: center;
        }
        .feedback-icon {
            font-size: 22px;
            width: 30px;
            display: inline-block;
            text-align: center;
        }
        .correct-ans-text {
            font-size: 14px;
            color: var(--danger);
            margin-left: 10px;
            font-weight: bold;
        }
        
        /* Klok & Breuken specifieke styling binnen de rij */
        .klok-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 10px 0;
        }
        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            padding: 0 4px;
            font-size: 18px;
        }
        .fraction .num { border-bottom: 2px solid var(--text); padding-bottom: 2px; }
        .fraction .den { padding-top: 2px; }
        .verhaal-tekst {
            font-size: 16px;
            line-height: 1.4;
            max-width: 75%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎒 Rekenen Oefenen</h1>

    <!-- INSTELLINGEN (BEGINPAGINA) -->
    <div id="setup" class="setup-section active">
        <h2>Kies jouw niveau en aantal sommen</h2>
        <div class="grid">
            <div class="form-group">
                <label for="groep">Groep / Niveau:</label>
                <select id="groep">
                    <option value="4">Groep 4 (Basis tot 100)</option>
                    <option value="5">Groep 5 (Tot 1.000, tafels)</option>
                    <option value="6">Groep 6 (Tot 10.000, grote delingen)</option>
                    <option value="7">Groep 7 (Miljoenen, breuken expert)</option>
                    <option value="8">Groep 8 (Voortgezet onderwijs voorbereiding)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="numQuestionsPerType">Aantal sommen per onderdeel:</label>
                <select id="numQuestionsPerType">
                    <option value="5">5 sommen</option>
                    <option value="10" selected>10 sommen</option>
                    <option value="15">15 sommen</option>
                    <option value="20">20 sommen</option>
                </select>
            </div>
        </div>

        <div class="form-group" style="margin-bottom: 25px;">
            <label>Selecteer de onderdelen:</label>
            <div class="checkbox-group">
                <label class="checkbox-label"><input type="checkbox" id="chk-sommen" checked> Basis Sommen (+, -, ×, ÷)</label>
                <label class="checkbox-label"><input type="checkbox" id="chk-klok" checked> Klokkijken</label>
                <label class="checkbox-label"><input type="checkbox" id="chk-verhaal" checked> Verhaaltjessommen & Geld</label>
                <label class="checkbox-label"><input type="checkbox" id="chk-breuken" checked> Breuken</label>
            </div>
        </div>

        <button onclick="startOefening()" style="width: 100%;">Genereer Sommen! 🚀</button>
    </div>

    <!-- WERKOMGEVING (SOMMEN ONDER ELKAAR) -->
    <div id="workspace" class="workspace-section">
        <h2 id="oefeningTitel">Sommenoverzicht</h2>
        <div id="sommenLijst" class="sommen-lijst"></div>
        <button id="nakijkKnop" onclick="nakijken()" style="width: 100%; background-color: var(--success); font-size: 18px;">Klaar! Nakijken en score berekenen ✔</button>
    </div>

    <!-- RESULTATEN -->
    <div id="results" class="result-section">
        <h2>Resultaat 🎉</h2>
        <p id="scoreText" style="font-size: 22px; text-align: center; margin: 20px 0;"></p>
        <button onclick="restartOefening()" style="width: 100%;">Nieuwe sommen maken 🔄</button>
    </div>
</div>

<script>
let state = {
    level: 4, questionsPerType: 10, questionsList: []
};

const DATA = {
    names: ['Daan', 'Sophie', 'Luuk', 'Emma', 'Milan', 'Julia', 'Sem', 'Tess', 'Lars', 'Zoë'],
    items: ['appels', 'bananen', 'voetbalplaatjes', 'potloden', 'knikkers', 'koekjes', 'snoepjes'],
    stores: ['supermarkt', 'bakker', 'speelgoedwinkel', 'groenteboer'],
    fractions: [
        {text: '1/2', val: 0.5, label: '<div class="fraction"><span class="num">1</span><span class="den">2</span></div>'},
        {text: '1/3', val: 1/3, label: '<div class="fraction"><span class="num">1</span><span class="den">3</span></div>'},
        {text: '1/4', val: 0.25, label: '<div class="fraction"><span class="num">1</span><span class="den">4</span></div>'},
        {text: '3/4', val: 0.75, label: '<div class="fraction"><span class="num">3</span><span class="den">4</span></div>'},
        {text: '1/5', val: 0.2, label: '<div class="fraction"><span class="num">1</span><span class="den">5</span></div>'},
        {text: '2/5', val: 0.4, label: '<div class="fraction"><span class="num">2</span><span class="den">5</span></div>'},
        {text: '3/5', val: 0.6, label: '<div class="fraction"><span class="num">3</span><span class="den">5</span></div>'},
        {text: '1/8', val: 0.125, label: '<div class="fraction"><span class="num">1</span><span class="den">8</span></div>'},
        {text: '5/8', val: 0.625, label: '<div class="fraction"><span class="num">5</span><span class="den">8</span></div>'}
    ]
};

function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function startOefening() {
    state.level = parseInt(document.getElementById('groep').value);
    state.questionsPerType = parseInt(document.getElementById('numQuestionsPerType').value);
    state.questionsList = [];
    
    let allowedTypes = [];
    if(document.getElementById('chk-sommen').checked) allowedTypes.push('som');
    if(document.getElementById('chk-klok').checked) allowedTypes.push('klok');
    if(document.getElementById('chk-verhaal').checked) allowedTypes.push('verhaal');
    if(document.getElementById('chk-breuken').checked) allowedTypes.push('breuk');

    if(allowedTypes.length === 0) {
        alert('Selecteer minimaal één onderwerp!');
        return;
    }

    // Genereer het gekozen aantal sommen PER geselecteerd onderwerp
    allowedTypes.forEach(type => {
        for(let i = 0; i < state.questionsPerType; i++) {
            state.questionsList.push(generateQuestionData(type, state.level));
        }
    });

    // Schud de lijst willekeurig door elkaar voor een leuke mix
    state.questionsList.sort(() => Math.random() - 0.5);

    document.getElementById('setup').classList.remove('active');
    document.getElementById('workspace').classList.add('active');
    
    renderAlleSommen();
}

function generateQuestionData(type, lv) {
    if (type === 'som') {
        let a, b, op, text, ans;
        if(lv == 4) {
            op = pick(['+', '-']);
            a = rand(10, 80); b = rand(5, 19);
            if(op === '+') { ans = a + b; text = `${a} + ${b} =`; }
            else { ans = Math.max(a, b) - Math.min(a, b); text = `${Math.max(a, b)} - ${Math.min(a, b)} =`; }
        } else if(lv == 5) {
            op = pick(['+', '-', 'x']);
            if(op === 'x') { a = rand(2, 9); b = rand(3, 9); ans = a * b; text = `${a} × ${b} =`; }
            else { a = rand(100, 800); b = rand(50, 150); ans = op==='+' ? a+b : a-b; text = `${a} ${op} ${b} =`; }
        } else {
            op = pick(['+', '-', 'x', '/']);
            if(op === 'x') { a = rand(12, 50); b = rand(5, 12); ans = a * b; text = `${a} × ${b} =`; }
            else if(op === '/') { b = rand(4, 12); ans = rand(5, 15); a = ans * b; text = `${a} ÷ ${b} =`; }
            else { a = rand(1000, 9000); b = rand(500, 4000); ans = op==='+' ? a+b : a-b; text = `${a} ${op} ${b} =`; }
        }
        return { text, answer: String(ans), type: 'open' };
    }

    if (type === 'klok') {
        let hr = rand(1, 12), mn = pick([0, 15, 30, 45, 10, 20, 40, 50]);
        if(lv == 4) mn = pick([0, 30]);
        let timeStr = `${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}`;
        
        let ansText = "";
        if(mn===0) ansText = `${hr} uur`;
        else if(mn===30) ansText = `half ${hr === 12 ? 1 : hr + 1}`;
        else if(mn===15) ansText = `kwart over ${hr}`;
        else if(mn===45) ansText = `kwart voor ${hr === 12 ? 1 : hr + 1}`;
        else ansText = timeStr;

        return { text: "Hoe laat is het op de klok? (Vul in bijv. 'half 5' of '04:15')", answer: ansText.toLowerCase(), isClock: true, hr, mn, type: 'open' };
    }

    if (type === 'verhaal') {
        let name = pick(DATA.names), item = pick(DATA.items), store = pick(DATA.stores);
        let a = rand(20, 60), b = rand(11, 35), ans = a + b;
        let storyType = rand(1, 2);
        
        if (storyType === 1) {
            return {
                text: `<span class="verhaal-tekst">${name} heeft ${a} ${item}. Vandaag krijgt ${name} er nog ${b} ${item} bij. Hoeveel zijn het er nu samen?</span>`,
                answer: String(ans),
                type: 'open'
            };
        } else {
            let priceA = rand(1, 4), priceB = rand(1, 2), total = priceA + priceB;
            return {
                text: `<span class="verhaal-tekst">Je koopt fruit voor €${priceA} en drinken voor €${priceB}. Je betaalt met een briefje van €10. Hoeveel euro krijg je terug? (€)</span>`,
                answer: String(10 - total),
                type: 'open'
            };
        }
    }

    if (type === 'breuk') {
        let f1 = pick(DATA.fractions);
        if(lv <= 5) {
            let totalVal = rand(12, 48);
            // Zorg voor een mooi heel getal als uitkomst
            while((totalVal * f1.val) % 1 !== 0) { totalVal = rand(12, 48); }
            let share = Math.round(totalVal * f1.val);
            return {
                text: `Wat is ${f1.label} van ${totalVal}?`,
                answer: String(share),
                type: 'open'
            };
        } else {
            let f2 = pick(DATA.fractions);
            while(f1.val === f2.val) { f2 = pick(DATA.fractions); }
            let ansLabel = f1.val > f2.val ? f1.text : f2.text;
            return { 
                text: `Welke breuk is het GROOTST? Typ in: <b>${f1.text}</b> of <b>${f2.text}</b> <br>${f1.label} of ${f2.label}`, 
                answer: ansLabel, 
                type: 'open' 
            };
        }
    }
}

function renderAlleSommen() {
    const lijst = document.getElementById('sommenLijst');
    lijst.innerHTML = '';
    
    document.getElementById('oefeningTitel').textContent = `Totaal: ${state.questionsList.length} sommen om op te lossen`;
    document.getElementById('nakijkKnop').style.display = 'block';

    state.questionsList.forEach((q, index) => {
        let rij = document.createElement('div');
        rij.className = 'som-rij';
        rij.id = `som-rij-${index}`;

        let contentDiv = document.createElement('div');
        contentDiv.className = 'som-content';
        
        if(q.isClock) {
            let klokBox = document.createElement('div');
            klokBox.className = 'klok-container';
            klokBox.innerHTML = `<span style="font-size:16px; margin-bottom:5px;">${q.text}</span><canvas id="canvas-${index}" width="160" height="160"></canvas>`;
            contentDiv.appendChild(klokBox);
        } else {
            let textSpan = document.createElement('span');
            textSpan.innerHTML = `${index + 1}. &nbsp; ${q.text}`;
            contentDiv.appendChild(textSpan);
        }

        let inputWrapper = document.createElement('div');
        inputWrapper.className = 'som-input-wrapper';
        
        let input = document.createElement('input');
        input.type = 'text';
        input.id = `input-${index}`;
        input.autocomplete = 'off';
        
        let feedback = document.createElement('span');
        feedback.className = 'feedback-icon';
        feedback.id = `feedback-${index}`;

        let correctAnsText = document.createElement('span');
        correctAnsText.className = 'correct-ans-text';
        correctAnsText.id = `correct-text-${index}`;

        inputWrapper.appendChild(input);
        inputWrapper.appendChild(feedback);
        inputWrapper.appendChild(correctAnsText);
        
        rij.appendChild(contentDiv);
        rij.appendChild(inputWrapper);
        lijst.appendChild(rij);

        if(q.isClock) {
            // Geef de browser heel even de tijd om het canvas te laden voordat we tekenen
            setTimeout(() => drawClock(`canvas-${index}`, q.hr, q.mn), 50);
        }
    });
}

function drawClock(canvasId, hr, mn) {
    const canvas = document.getElementById(canvasId);
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    let r = canvas.width / 2;
    ctx.translate(r, r);
    r = r * 0.9;
    
    ctx.beginPath(); ctx.arc(0, 0, r, 0, 2*Math.PI);
    ctx.fillStyle = 'white'; ctx.fill();
    ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 3; ctx.stroke();
    
    ctx.beginPath(); ctx.arc(0, 0, 4, 0, 2*Math.PI);
    ctx.fillStyle = '#2c3e50'; ctx.fill();

    for(let i = 0; i < 60; i++) {
        let angle = (i * Math.PI) / 30;
        ctx.rotate(angle);
        ctx.beginPath();
        if (i % 5 === 0) {
            ctx.moveTo(0, -r + 10); ctx.lineTo(0, -r);
            ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 2;
        } else {
            ctx.moveTo(0, -r + 5); ctx.lineTo(0, -r);
            ctx.strokeStyle = '#7f8c8d'; ctx.lineWidth = 1;
        }
        ctx.stroke(); ctx.rotate(-angle);
    }

    ctx.font = "bold 12px Segoe UI";
    ctx.textBaseline = "middle"; ctx.textAlign = "center";
    ctx.fillStyle = '#2c3e50';
    for(let num = 1; num <= 12; num++){
        let ang = num * Math.PI / 6;
        ctx.rotate(ang); ctx.translate(0, -r + 18); ctx.rotate(-ang);
        ctx.fillText(num.toString(), 0, 0);
        ctx.rotate(ang); ctx.translate(0, r - 18); ctx.rotate(-ang);
    }

    let hourPos = (hr % 12) * 5 + (mn / 12);
    // Urenwijzer
    ctx.beginPath(); ctx.lineWidth = 4; ctx.lineCap = "round"; ctx.strokeStyle = '#2c3e50';
    ctx.moveTo(0,0); ctx.rotate(hourPos * Math.PI / 30); ctx.lineTo(0, -r * 0.5); ctx.stroke(); ctx.rotate(-hourPos * Math.PI / 30);
    
    // Minutenwijzer
    ctx.beginPath(); ctx.lineWidth = 2; ctx.lineCap = "round"; ctx.strokeStyle = '#e74c3c';
    ctx.moveTo(0,0); ctx.rotate(mn * Math.PI / 30); ctx.lineTo(0, -r * 0.75); ctx.stroke(); ctx.rotate(-mn * Math.PI / 30);

    ctx.translate(-canvas.width/2, -canvas.width/2);
}

function nakijken() {
    let score = 0;
    
    state.questionsList.forEach((q, index) => {
        let inputEl = document.getElementById(`input-${index}`);
        let feedbackEl = document.getElementById(`feedback-${index}`);
        let correctTextEl = document.getElementById(`correct-text-${index}`);
        let rijEl = document.getElementById(`som-rij-${index}`);
        
        let userAnswer = inputEl.value.trim().toLowerCase();
        let correctAnswer = q.answer.trim().toLowerCase();
        
        // Input uitschakelen na nakijken
        inputEl.disabled = true;

        if(userAnswer === correctAnswer) {
            score++;
            feedbackEl.textContent = '❌'; // Wordt overschreven door styling/emojis, groen vinkje
            feedbackEl.innerHTML = '<span style="color:var(--success)">✔</span>';
            rijEl.style.borderLeft = "5px solid var(--success)";
        } else {
            feedbackEl.innerHTML = '<span style="color:var(--danger)">❌</span>';
            rijEl.style.borderLeft = "5px solid var(--danger)";
            correctTextEl.textContent = `(Goed: ${q.answer})`;
        }
    });

    document.getElementById('nakijkKnop').style.display = 'none';
    
    // Scorerapportage tonen onderaan
    let resultaatSectie = document.getElementById('results');
    document.getElementById('scoreText').textContent = `Super gedaan! Je hebt ${score} van de ${state.questionsList.length} sommen goed uitgerekend!`;
    resultaatSectie.classList.add('active');
    
    // Scroll soepel naar het resultaat
    resultaatSectie.scrollIntoView({ behavior: 'smooth' });
}

function restartOefening() {
    document.getElementById('results').classList.remove('active');
    document.getElementById('workspace').classList.remove('active');
    document.getElementById('setup').classList.add('active');
}
</script>
</body>
</html>
