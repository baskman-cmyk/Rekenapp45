        {v: "Je leest {t} bladzijden in de ochtend en {w} in de middag. Hoeveel totaal?", f: (t, w) => t + w},

    function genereerWerkblad() {
        state.sommenData = []; // Reset opslag
        // ... (Zorg dat bij elke bouwSom cat, vraag, antwoord worden gevuld) ...
        // Voor Tijd: voeg expliciet toe: s.vraag = "Hoe laat is het?"; s.extraUitleg = "Vul in als hh:mm";
        // ... (Update de DOM) ...
    }

    function genereerPDF() {
        if(state.sommenData.length === 0) {
            alert("Maak eerst een werkblad aan.");
            return;
        }
        // Forceer renderen van de opgeslagen state.sommenData
        const element = document.createElement('div');
        state.sommenData.forEach((s, i) => {
            element.innerHTML += `<p>${i+1}. ${s.vraag} | Antwoord: ${s.antwoord}</p>`;
        });
        html2pdf().from(element).save('mijn_rekenblad.pdf');
    }
