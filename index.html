<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smarter RekenApp Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #4318ff; --bg-main: #f4f7fe; --border: #e0e5f2; }
        body { font-family: sans-serif; background: var(--bg-main); display: flex; justify-content: center; padding: 20px; }
        .app-window { width: 100%; max-width: 768px; background: white; padding: 20px; border-radius: 20px; }
        .view { display: none; }
        .view.active { display: block; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .tile { border: 2px solid var(--border); padding: 15px; border-radius: 15px; cursor: pointer; }
        .tile.active { border-color: var(--primary); background: #f4f2ff; }
        .btn-action { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; margin-top: 10px; cursor: pointer; }
        .som-row { border-bottom: 1px solid var(--border); padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="app-window">
    <!-- DASHBOARD -->
    <div id="view-dashboard" class="view active">
        <h1>Dashboard 📊</h1>
        <p>Punten: <span id="xpDisplay">0</span></p>
        
        <h3>Niveau</h3>
        <input type="range" id="levelSlider" min="0" max="3" value="1" style="width:100%">
        
        <h3>Categorieën</h3>
        <div class="dashboard-grid" id="categoryTiles">
            <!-- Tiles worden via JS toegevoegd -->
        </div>

        <button class="btn-action" onclick="genereerWerkblad()">Start Oefenblad 🚀</button>
        <button class="btn-action" style="background:#2563eb;" onclick="genereerPDF()">Download PDF 📄</button>
    </div>

    <!-- WERKBLAD -->
    <div id="view-werkblad" class="view">
        <button onclick="terugNaarHome()">Terug naar Dashboard</button>
        <div id="worksheetContainer"></div>
    </div>
</div>

<script>
    let state = {
        niveau: 1,
        selectedCategories: ['splitsen', 'tafels'],
        sommenData: [],
        punten: 0
    };

    const categories = ['splitsen', 'tafels', 'optellen_aftrekken', 'klokkijken', 'geld', 'redactie'];

    function init() {
        const container = document.getElementById('categoryTiles');
        categories.forEach(cat => {
            container.innerHTML += `<div class="tile ${state.selectedCategories.includes(cat) ? 'active' : ''}" id="tile-${cat}" onclick="toggleTile('${cat}')">${cat}</div>`;
        });
    }

    function toggleTile(cat) {
        const idx = state.selectedCategories.indexOf(cat);
        if(idx > -1) state.selectedCategories.splice(idx, 1);
        else state.selectedCategories.push(cat);
        document.getElementById(`tile-${cat}`).classList.toggle('active');
    }

    function genereerWerkblad() {
        state.sommenData = [{vraag: "2 x 3 =", antwoord: "6"}, {vraag: "5 + 5 =", antwoord: "10"}];
        const container = document.getElementById('worksheetContainer');
        container.innerHTML = "<h2>Oefenblad</h2>";
        state.sommenData.forEach((s, i) => {
            container.innerHTML += `<div class="som-row"><span>${s.vraag}</span><input type="text"></div>`;
        });
        document.getElementById('view-dashboard').classList.remove('active');
        document.getElementById('view-werkblad').classList.add('active');
    }

    function terugNaarHome() {
        document.getElementById('view-dashboard').classList.add('active');
        document.getElementById('view-werkblad').classList.remove('active');
    }

    function genereerPDF() {
        let element = document.createElement('div');
        element.innerHTML = "<h1>Rekenwerkblad</h1>";
        state.sommenData.forEach((s, i) => {
            element.innerHTML += `<p>${i+1}. ${s.vraag} ............</p>`;
        });
        html2pdf().from(element).save('Oefenblad.pdf');
    }

    init();
</script>
</body>
</html>
